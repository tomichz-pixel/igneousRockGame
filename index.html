<div id="rock-game" style="width:100%; max-width:900px; height:600px; margin:auto; font-family:sans-serif;">

<style>
#rock-game * { box-sizing:border-box; user-select:none; }

#rock-game .header {
    height:48px; background:#444; color:#fff;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 12px; font-size:13px; border-radius:8px 8px 0 0;
}

#rock-game .board {
    display:grid;
    grid-template-rows: repeat(8, auto 1fr);
    height: calc(600px - 48px);
    background:#f0f0f0;
    border:1px solid #ccc;
}

#rock-game .layer-label {
    font-size:10px;
    padding:2px 6px 0;
}

#rock-game .area {
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    gap:3px;
    padding:3px;
}

#rock-game .card {
    width:100%;
    aspect-ratio:1;
    cursor:pointer;
}

#rock-game .inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:0.3s;
}

#rock-game .flipped .inner { transform:rotateY(180deg); }

#rock-game .front, #rock-game .back {
    position:absolute;
    width:100%; height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:2px;
    backface-visibility:hidden;
    border-radius:4px;
    font-weight:bold;
    box-shadow:0 1px 2px rgba(0,0,0,0.2);
}

#rock-game .front {
    background:#cfd8dc;
    font-size:clamp(10px,2vw,14px);
}

#rock-game .back {
    background:white;
    transform:rotateY(180deg);
    font-size:clamp(8px,1.6vw,12px);
}

#rock-game .layer-0 .back { border-left:3px solid #ef5350; }
#rock-game .layer-1 .back { border-left:3px solid #42a5f5; }
#rock-game .layer-2 .back { border-left:3px solid #66bb6a; }
#rock-game .layer-3 .back { border-left:3px solid #ffa726; }

#rock-game .is-lucky .back {
    background:#fff9c4;
    border:2px solid #fbc02d !important;
}

#rock-game .matched {
    opacity:0;
    transform:scale(0);
    transition:0.4s;
    pointer-events:none;
}

#rock-game .modal {
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center; align-items:center;
    z-index:1000;
}

#rock-game .modal-content {
    background:white; padding:20px;
    border-radius:12px;
    width:90%; max-width:400px;
}

#rock-game .analysis {
    background:#f9f9f9;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    margin:10px 0;
    border-left:4px solid #ccc;
}

#rock-game button {
    width:100%;
    padding:12px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:6px;
}
</style>

<div class="header">
    <div>火成岩神経衰弱</div>
    <div>ミス: <span id="rock-m">0</span></div>
</div>

<div class="board" id="rock-board"></div>

<div class="modal" id="rock-modal">
    <div class="modal-content">
        <h2 id="rock-mt"></h2>
        <div id="rock-txt"></div>
        <div id="rock-analysis" class="analysis"></div>
        <button id="rock-btn">次へ</button>
    </div>
</div>

<script>
(function(){

const rockData = {
"流紋岩":{分類:"火山岩",速度:"急激",場所:"地表付近",組織:"斑状組織",色:"白っぽい",鉱物:["石英","長石","黒雲母"],note:"白っぽく粘り気の強い溶岩"},
"安山岩":{分類:"火山岩",速度:"急激",場所:"地表付近",組織:"斑状組織",色:"灰色",鉱物:["長石","カクセン石","黒雲母","輝石"],note:"日本で最も一般的"},
"玄武岩":{分類:"火山岩",速度:"急激",場所:"地表付近",組織:"斑状組織",色:"黒っぽい",鉱物:["長石","輝石","カクセン石"],note:"粘り気が弱い"},
"花崗岩":{分類:"深成岩",速度:"ゆっくり",場所:"地下深く",組織:"等粒状組織",色:"白っぽい",鉱物:["石英","長石","黒雲母"],note:"御影石"},
"閃緑岩":{分類:"深成岩",速度:"ゆっくり",場所:"地下深く",組織:"等粒状組織",色:"灰色",鉱物:["長石","カクセン石","黒雲母","輝石"],note:"灰色の深成岩"},
"斑れい岩":{分類:"深成岩",速度:"ゆっくり",場所:"地下深く",組織:"等粒状組織",色:"黒っぽい",鉱物:["長石","輝石","カクセン石"],note:"黒くて重い"}
};

const rockNames = Object.keys(rockData);
const attrTypes = ["分類","速度","場所","組織","色","鉱物"];

let selections=[null,null,null,null];
let lock=false, miss=0, matches=0;

const board=document.getElementById('rock-board');

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function getValidRocks(type,value){
if(value==="長石") return [...rockNames];
return rockNames.filter(n=>{
const d=rockData[n][type];
return Array.isArray(d)?d.includes(value):d===value;
});
}

function createCard(val,type,layerIdx){
const c=document.createElement('div');
c.className='card';
if(val==="長石") c.classList.add('is-lucky');

c.innerHTML=`
<div class="inner">
<div class="front">?</div>
<div class="back">${val}</div>
</div>`;

c.onclick=()=>{
if(lock||c.classList.contains('flipped')||c.classList.contains('matched')) return;

if(selections[layerIdx]) selections[layerIdx].classList.remove('flipped');

c.classList.add('flipped');
selections[layerIdx]=c;
c.dataset.val=val;
c.dataset.type=type;

if(selections.every(s=>s!==null)){
lock=true;
setTimeout(checkMatch,400);
}
};
return c;
}

function checkMatch(){
let candidates=[...rockNames];

selections.forEach(s=>{
const valid=getValidRocks(s.dataset.type,s.dataset.val);
candidates=candidates.filter(n=>valid.includes(n));
});

if(candidates.length===1){
const name=candidates[0];
const res=rockData[name];
matches++;

let analysisHtml=`<b>${name}</b> の特徴：<br>`;
selections.forEach(s=>{
if(s.dataset.type==="岩石名") return;
let v=res[s.dataset.type];
if(Array.isArray(v)) v=v.join("・");
analysisHtml+=`${s.dataset.type}：○（${v}）<br>`;
});

showModal("正解！",
`<b>${name}</b><br>${res.note}`,
analysisHtml,true);

}else{
miss++;
document.getElementById('rock-m').textContent=miss;

const rockCard = selections.find(s=>s.dataset.type==="岩石名");
const target = rockCard ? rockCard.dataset.val : rockNames[0];
const correct = rockData[target];

let diffHtml=`<b>${target}</b> の正しい特徴：<br>`;

selections.forEach(s=>{
if(s.dataset.type==="岩石名") return;

const ok=getValidRocks(s.dataset.type,s.dataset.val).includes(target);
let v=correct[s.dataset.type];
if(Array.isArray(v)) v=v.join("・");

diffHtml+=`${s.dataset.type}：${ok?"○":`<b>× ${s.dataset.val}</b>`}（正：${v}）<br>`;
});

showModal("残念…","不正解です",diffHtml,false);
}
}

function showModal(title,msg,analysis,isSuccess){
const modal=document.getElementById('rock-modal');
document.getElementById('rock-mt').textContent=title;
document.getElementById('rock-txt').innerHTML=msg;

const a=document.getElementById('rock-analysis');
a.innerHTML=analysis;
a.style.display=analysis?"block":"none";

modal.style.display='flex';

document.getElementById('rock-btn').onclick=()=>{
modal.style.display='none';

if(isSuccess){
selections.forEach(s=>s.classList.add('matched'));
}else{
selections.forEach(s=>s.classList.remove('flipped'));
}

selections=[null,null,null,null];
lock=false;
};
}

function init(){
board.innerHTML='';
miss=0; matches=0;
document.getElementById('rock-m').textContent=0;

const layers=[...shuffle([...attrTypes]).slice(0,3),"岩石名"];

layers.forEach((type,i)=>{
const label=document.createElement('div');
label.className='layer-label';
label.textContent=`層${i+1}:${type}`;
board.appendChild(label);

const area=document.createElement('div');
area.className=`area layer-${i}`;

let vals=[];
if(type==="岩石名"){
vals=shuffle([...rockNames]);
}else if(type==="鉱物"){
vals=shuffle(["石英","長石","黒雲母","輝石","カクセン石","長石"]);
}else{
vals=shuffle([...new Set(rockNames.map(n=>rockData[n][type]))]);
}

vals.forEach(v=>area.appendChild(createCard(v,type,i)));
board.appendChild(area);
});
}

init();

})();
</script>
</div>


ここまで来てると、もう「教材として使えるレベル」です。
次にやるなら「理解を加速させるUI」に入る段階ですね。
